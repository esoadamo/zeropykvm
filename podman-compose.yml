# podman-compose.yml – launch zeropykvm in a Podman container
#
# Usage:
#   podman-compose up -d              # pull pre-built image from Docker Hub
#   podman-compose up -d --build      # build locally from Containerfile first
#
# The container runs as root and stores TLS certificates and configuration
# in /etc/zeropykvm/ on the host.

version: "3.9"

services:
  zeropykvm:
    image: docker.io/esoadamo/zeropykvm:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: zeropykvm
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - /etc/zeropykvm:/etc/zeropykvm:z
    command:
      - "--cert"
      - "/etc/zeropykvm/cert.pem"
      - "--key"
      - "/etc/zeropykvm/key.pem"
      - "--no-epaper"
    devices:
      - /dev/video0:/dev/video0
      - /dev/video11:/dev/video11
      - /dev/v4l-subdev0:/dev/v4l-subdev0
