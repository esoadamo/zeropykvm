# podman-compose.yml – build, push, and run zeropykvm in a Podman container
#
# Usage:
#   podman compose build              # build image from Containerfile
#   podman compose push               # push to docker.io
#   podman compose up -d              # start container

version: "3.9"

services:
  zeropykvm:
    image: docker.io/esoadamo/zeropykvm:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: zeropykvm
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - /etc/zeropykvm:/etc/zeropykvm:z
    devices:
      - /dev/video0:/dev/video0
      - /dev/video11:/dev/video11
      - /dev/v4l-subdev0:/dev/v4l-subdev0
